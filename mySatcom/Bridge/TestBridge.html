<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATCOM Bridge | Test Console (WS-A Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004a99;
            --secondary: #00d4ff;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 74, 153, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 600;
            margin-top: 0;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 400;
            color: var(--gray);
        }

        input, select, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .btn {
            width: 100%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0, 74, 153, 0.3);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .response-container {
            margin-top: 2rem;
            display: none;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-error { background: rgba(239, 68, 68, 0.2); color: var(--error); }

        pre {
            background: #000;
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 300px;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 1rem 0;
        }

        .dot-pulse {
            position: relative;
            left: -9999px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 9999px 0 0 0 var(--secondary);
            animation: dotPulse 1.5s infinite linear;
            margin: 0 auto;
        }

        @keyframes dotPulse {
            0% { box-shadow: 9999px 0 0 -5px var(--secondary); }
            30% { box-shadow: 9999px 0 0 2px var(--secondary); }
            60%, 100% { box-shadow: 9999px 0 0 -5px var(--secondary); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>SATCOM Bridge Console</h1>
            <p class="subtitle">Solución al error AddressFilter Mismatch (HTTP vs HTTPS)</p>

            <div class="form-group">
                <label>Endpoint URL (Conexión Real)</label>
                <input type="text" id="endpoint" value="https://bridge-testing.mysatcomla.com/WcfBridge.svc">
            </div>

            <div class="form-group">
                <label>Método de Prueba</label>
                <select id="method">
                    <option value="Test">Test() - Verificar Conectividad</option>
                    <option value="ProcesarComprobante">ProcesarComprobante() - Envío (Ejemplo)</option>
                </select>
            </div>

            <button class="btn" onclick="executeCall()">Ejecutar Solicitud</button>

            <div class="loader" id="loader">
                <div class="dot-pulse"></div>
            </div>

            <div class="response-container" id="responseArea">
                <div class="response-header">
                    <span>Resultado de la Operación</span>
                    <span id="statusBadge" class="status-badge"></span>
                </div>
                <pre id="output"></pre>
            </div>
        </div>
    </div>

    <script>
        async function executeCall() {
            const endpoint = document.getElementById('endpoint').value;
            const method = document.getElementById('method').value;
            const output = document.getElementById('output');
            const responseArea = document.getElementById('responseArea');
            const statusBadge = document.getElementById('statusBadge');
            const loader = document.getElementById('loader');

            // Configuración de Acciones SOAP
            const actions = {
                'Test': 'http://tempuri.org/IBridge/Test',
                'ProcesarComprobante': 'http://tempuri.org/IBridge/ProcesarComprobante'
            };

            const action = actions[method];

            // IMPORTANTE: WCF espera el encabezado To exactamente como está en el WSDL (HTTP)
            // aunque la llamada se haga por HTTPS.
            const wsaTo = endpoint.replace('https://', 'http://');

            // Preparar Envelope SOAP 1.2 con WS-Addressing Corregido
            let soapBody = '';
            if(method === 'Test') {
                soapBody = `<tem:Test/>`;
            } else {
                soapBody = `<tem:ProcesarComprobante>
                    <tem:strRequerimiento><![CDATA[<Requerimiento xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema"><InformacionAdicional><Campo><Descripcion>Contribuyente Negocio Popular - Régimen RIMPE</Descripcion><Valor>.</Valor></Campo></InformacionAdicional><ConceptoEmision>3 - BACKEND BOLETOS NACIONALES:$1150</ConceptoEmision><Codigo>01</Codigo><NumeroDocumento>000002984</NumeroDocumento><FechaEmision>11/07/2025 08:32:00</FechaEmision><FechaEmisionPais>11/07/2025 08:32:00</FechaEmisionPais><FechaEmisionFormatoPais>11/07/2025</FechaEmisionFormatoPais><TasaCambioPrincipal>0</TasaCambioPrincipal><TasaCambioAlternativa>0</TasaCambioAlternativa><ValorMinimoPrincipal>0</ValorMinimoPrincipal><ValorMinimoAlternativo>0</ValorMinimoAlternativo><CondicionVenta/><CodigoReferencia/><TotalSinImpuestos>1000.00</TotalSinImpuestos><TotalConImpuestos>1150.00</TotalConImpuestos><Retencion/><DetallesProceso/><CodigoPagoLocalizacionExtranjera xsi:nil="true"/><CodigoTipoRegimenFiscalExterior xsi:nil="true"/><CodigoPaisEfectuaPago xsi:nil="true"/><AplicaConvenioDobleTributacion>false</AplicaConvenioDobleTributacion><EsPagoExteriorSujetoRetencionNormaLegal>false</EsPagoExteriorSujetoRetencionNormaLegal><Impuestos><Impuesto><CodigoImpuesto>2</CodigoImpuesto><Impuesto>IVA %15.0000</Impuesto><CodigoPorcentaje>4</CodigoPorcentaje><Porcentaje>15</Porcentaje><BaseImponible>1000.00</BaseImponible><Valor>150.00</Valor><UnidadMedida xsi:nil="true"/><FechaPago xsi:nil="true"/><ValorImpuestoRenta xsi:nil="true"/><AnioEjercicioFiscal xsi:nil="true"/><Exonerado>false</Exonerado></Impuesto></Impuestos><Pagos><Pago><FormaPagoEcuador>SIN_UTILIZACION_DEL_SISTEMA_FINANCIERO_01</FormaPagoEcuador><FormaPagoCostaRica>Efectivo</FormaPagoCostaRica><FormaPagoPeru>Efectivo</FormaPagoPeru><FormaPagoColombia>Contado</FormaPagoColombia><FormaPagoArgentina>Contado</FormaPagoArgentina><CodigoFormaPago>01</CodigoFormaPago><Total>1150</Total><Plazo>0</Plazo><UnidadTiempo>1</UnidadTiempo><InformacionAdicional/></Pago></Pagos><Pais>Ecuador</Pais><FechaAutorizacion>15/07/2025 11:08:37</FechaAutorizacion><FechaIN>15/07/2025 11:08:34</FechaIN><IdReqAsociado>0</IdReqAsociado><ReprocesoManual>false</ReprocesoManual><CodigoEmisor>1</CodigoEmisor><RucEmisor>1790824845001</RucEmisor><Establecimiento>001</Establecimiento><Punto>003</Punto><Moneda>DOLAR</Moneda><Ambiente>1</Ambiente><Version>1.0.0</Version><TotalTributos>0</TotalTributos><Cliente><RazonSocial>PRUEBA SAC</RazonSocial><Direccion>test address</Direccion><TipoIdentificacion>04</TipoIdentificacion><NumeroIdentificacion>1790085783001</NumeroIdentificacion><Ubicacion/><email/><NombreComercial xsi:nil="true"/><NumeroContribuyenteEspecial xsi:nil="true"/><ContabilidadObligada xsi:nil="true"/><CodigoTipoSujetoRetenido xsi:nil="true"/><EsParteRelacionalConEmisor>false</EsParteRelacionalConEmisor><Telefono/><CodigoPaisTelefono>0</CodigoPaisTelefono></Cliente><Transporte/><TipoEnvio/><Detalles><Detalle id="1"><Cantidad>1</Cantidad><Descuento>0.00</Descuento><SubTotal>1000.00</SubTotal><Tipo>Mercancia</Tipo><Exonerar>false</Exonerar><Producto><TipoProducto/><Codigo>undefined</Codigo><Descripcion>3 - BACKEND BOLETOS NACIONALES</Descripcion><ValorUnitario>1000</ValorUnitario><CineCenter>false</CineCenter></Producto><Impuestos><Impuesto><CodigoImpuesto>2</CodigoImpuesto><CodigoPorcentaje>4</CodigoPorcentaje><Porcentaje>15</Porcentaje><BaseImponible>1000.00</BaseImponible><Valor>150.00</Valor><UnidadMedida xsi:nil="true"/><FechaPago xsi:nil="true"/><ValorImpuestoRenta xsi:nil="true"/><AnioEjercicioFiscal xsi:nil="true"/><Exonerado>false</Exonerado></Impuesto></Impuestos></Detalle></Detalles><DetalleExportacion/><Canal>BRIDGE</Canal><TotalIsc>0</TotalIsc><TotalIgv>0</TotalIgv><Gravadas>0</Gravadas><TotalDetraccion>0</TotalDetraccion><Procesar>false</Procesar><Actividad/></Requerimiento>]]></tem:strRequerimiento>
                    <tem:Comprimido>false</tem:Comprimido>
                </tem:ProcesarComprobante>`;
            }

            const soapRequest = `<?xml version="1.0" encoding="utf-8"?>
<soap:Envelope xmlns:soap="http://www.w3.org/2003/05/soap-envelope" xmlns:tem="http://tempuri.org/" xmlns:wsa="http://www.w3.org/2005/08/addressing">
   <soap:Header>
      <wsa:Action soap:mustUnderstand="1">${action}</wsa:Action>
      <wsa:To soap:mustUnderstand="1">${wsaTo}</wsa:To>
   </soap:Header>
   <soap:Body>
      ${soapBody}
   </soap:Body>
</soap:Envelope>`;

            // Reset UI
            responseArea.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/soap+xml; charset=utf-8',
                    },
                    body: soapRequest
                });

                const data = await response.text();
                
                statusBadge.textContent = response.ok ? `STATUS: ${response.status} OK` : `STATUS: ${response.status} ERROR`;
                statusBadge.className = response.ok ? 'status-badge status-success' : 'status-badge status-error';
                
                // Formatear XML simple
                output.textContent = data.replace(/></g, '>\n<');
                
            } catch (error) {
                statusBadge.textContent = 'ERROR DE CONEXIÓN / CORS';
                statusBadge.className = 'status-badge status-error';
                output.textContent = `Error: ${error.message}`;
            } finally {
                loader.style.display = 'none';
                responseArea.style.display = 'block';
            }
        }
    </script>
</body>
</html>
